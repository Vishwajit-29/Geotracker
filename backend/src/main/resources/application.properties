# Server
server.port=8080
server.address=0.0.0.0

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/geotracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:geotracker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:geotracker}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# JWT
jwt.secret=${JWT_SECRET:geotracker-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=${JWT_EXPIRATION:86400000}