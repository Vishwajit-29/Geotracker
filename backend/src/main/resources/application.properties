# Server
server.port=8080
server.address=0.0.0.0

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/geotracker
spring.datasource.username=geotracker
spring.datasource.password=geotracker
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=geotracker-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000